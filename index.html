<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <!-- Bootstrap-->
     <link href="bootstrap-3.4.1-dist/css/bootstrap.min.css" rel="stylesheet">

    </head>
<body>
    
    <div class="container">
        <div class="page-header">
            <h1>Tabela boostrap</h1>
        </div>
            <!--table striped efeito de cores alternadas, table-bordered inclui borda na tabela, table-hover efeito quando passa o mouse sobre a tabela, table-condensed diminui o espaço das linhas-->
            <table class="table table-striped table-bordered table-hover table-condensed">
            <thead>
                <tr>

                    <th>Produto</th>
                    <th>Fabricante</th>
                    <th>Preço</th>
                </tr>
                </thead>
                <tbody>
                    <tr class="success">
                        <td>Notebook 980</td>
                        <td>HP</td>
                        <td>R$ 1.800,00</td>
                    </tr>
                    <tr class="danger">
                        <td>MacBook Air</td>
                        <td>Apple</td>
                        <td>R$ 4.800,00</td>
                    </tr>
                    <tr>
                        <td class="warning"> HP Pavillon</td>
                        <td class="info">HP</td>
                        <td>R$ 2.800,00</td>
                    </tr>
                </tbody>



                



           
            
            
            </table>

      




    </div>
</body>
</html>
