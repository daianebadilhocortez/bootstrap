<html lang="en">
<head>

    <title>Tabelas</title>
    <!-- Bootstrap-->
     <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet"

    </head>
<body>
    
    <div class="container">
        <div class="page-header">
            <h1>Tabela boostrap</h1>
        </div>
            <!--table striped efeito de cores alternadas, table-bordered inclui borda na tabela, table-hover efeito quando passa o mouse sobre a tabela, table-condensed diminui o espaço das linhas-->

            <thead>
                <tr>

                    <th>Produto</th>
                    <th>Fabricante</th>
                    <th>Preço</th>
                </tr>



            </thead>
            
            
            </table>

      




    </div>
</body>
