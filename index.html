<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <!-- Bootstrap-->
     <link href="bootstrap-3.4.1-dist/css/bootstrap.min.css" rel="stylesheet">

    </head>
<body>
    
    <div class="container">
        <div class="page-header">
            <h1>Tabela boostrap</h1>
        </div>
            <!--table striped efeito de cores alternadas, table-bordered inclui borda na tabela, table-hover efeito quando passa o mouse sobre a tabela, table-condensed diminui o espaço das linhas-->
            <table class="table table-striped table-bordered table-hover table-condensed">
            <thead>
                <tr>

                    <th>Produto</th>
                    <th>Fabricante</th>
                    <th>Preço</th>
                </tr>
                </thead>
                <tbody>
                    <tr class="success">
                        <td>Notebook 980</td>
                        <td>HP</td>
                        <td>R$ 1.800,00</td>
                    </tr>
                    <tr class="danger">
                        <td>MacBook Air</td>
                        <td>Apple</td>
                        <td>R$ 4.800,00</td>
                    </tr>
                    <tr>
                        <td class="warning"> HP Pavillon</td>
                        <td class="info">HP</td>
                        <td>R$ 2.800,00</td>
                    </tr>
                </tbody>



                



           
            
            
            </table>

      




    </div>





    <div class="container">
        <div class="page-header">
            <h1>Formulários Boostrap</h1>
        </div>

    <div class="row">
        <div class="col-sm-8">
            <h3>Cadastre-se</h3>
            <form>
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" class="form-control" id="nome">
                </div>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input tpe="email" class="form-control" id="email">
                </div>
                <div class="form-group>">
                    <label for="senha">Senha</label>
                    <input type="password" class="form-control" id="senha">
                </div>
                <div class="checkbox">
                    <label>
                        <input type="checkbox">Aceito os termos de serviço.
                    </label>


                </div>
                
                <div class="radio">
                    <label>
                        <input type="radio" name="opcoes">Boostrap
                    </label>
                </div>
                <div class="radio">
                    <label>
                        <input type="radio" name="opcoes">Java
                    </label>
                </div>
                <button type="submit" class="btn btn-default">Cadastrar</button>
            </form>
        </div>

        <div class="col-sm-4">
            <h3>Login</h3>

            <div class="form-group">
                <input type="email" class="form-control" id="email" placeholder="Digite seu e-mail">
            </div>
            <div class="form-group">
                <input type="password" class="form-control" id="senha" placeholder="Digite sua senha">
            </div>
            <button type="submit" class="btn btn-primary">Entrar</button>
            </div>
        </div>
    </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
        <script src="bootstrap/js/bootstrap.min.js"></script>

    <div class="container">
        <div class="page-header">
            <h1>Botões boostrap</h1>
        </div>

        <div class="row">
            <div class="col-sm-6">
                <h3>Botões padrão</h3>
                <a href="#" class=""btn btn-default">Botão link</a>
                <input type="submit" class="btn btn-default" value="Botão Submit">

                <button class="btn btn-default">Botão Button</button>
            </div>
            <div class="col-sm-6">
                <h3>Tipos de botões</h3>
                <button class="btn btn-default">Botão</button>
                <button class="btn btn-primary">Botão</button>
                <button class="btn btn-success">Botão</button>
                <button class="btn btn-danger">Botão</button>
                <button class="btn btn-warning">Botão</button>
                <button class="btn btn-info">Botão</button>
                <button class="btn btn-link">Botão</button>
            </div>
        </div>
        <div class="row">
            div class="col-sm-6">
            <h3>Botões nível bloco</h3>
            <button class="btn btn-default btn-block">Botão</button>
            <button class="btn btn-primary btn-block">Botão</button>
            <button class="btn btn-danger btn-block">Botão</button>




        </div>











    </div>





    </body>
</html>
